services:
  api-manicure:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    volumes:
      - .:/api
    ports:
      - '${API_PORT:-3000}:3000'
    depends_on:
      - postgres-manicure-db

  postgres-manicure-db:
    image: postgres
    container_name: postgres-manicure-db
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_USER: ${DATABASE_USER}
    ports:
      - '${DATABASE_PORT}:5432'
